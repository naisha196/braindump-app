<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Fixed CSP: added blob: to default-src and removed restrictive media-src override -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' blob: data: https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; media-src 'self' blob: data: https://*.supabase.co;" />
<title>BrainDump</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COLOUR SCHEME — edit everything in here
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   --bg           background of the whole app
   --surface      card and input backgrounds
   --surface2     slightly lighter surface (hover states)
   --border       subtle borders
   --border2      slightly more visible borders
   --text         primary text colour
   --muted        secondary / label text
   --hint         placeholder and timestamp text
   --accent       highlight colour (buttons, active states)
   --accent-dark  text colour on top of --accent
   --audio        audio card accent
   --photo        photo card accent
   --note         note card accent
   --idea         idea card accent
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: rgba(240,237,232,0.1);
  --border2: rgba(240,237,232,0.2);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --hint: rgba(240,237,232,0.25);
  --accent: #c9ff72;
  --accent-dark: #0e0e0e;
  --audio: #818cf8;
  --photo: #fb923c;
  --note: #34d399;
  --idea: #c9ff72;
  --radius: 14px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100%;
  overflow: hidden;
}

.shell {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  width: 100vw;
  padding: 20px;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  max-height: 900px;
  max-width: 600px;
  border: 0.5px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

/* ── Auth ── */
.auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 40px 24px; }
.auth-logo { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; text-align: center; }
.auth-logo span { color: var(--accent); }
.auth-tagline { font-size: 14px; color: var(--muted); margin-bottom: 36px; text-align: center; line-height: 1.7; }
.auth-card { width: 100%; max-width: 360px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 22px; display: flex; flex-direction: column; gap: 10px; }
.auth-divider { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
.auth-divider-line { flex: 1; height: 0.5px; background: var(--border2); }
.auth-divider-text { font-size: 11px; color: var(--hint); }
.auth-input { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.12s; }
.auth-input::placeholder { color: var(--hint); }
.auth-input:focus { border-color: rgba(201,255,114,0.4); }
.btn-google { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.12s; font-weight: 500; }
.btn-google:hover { background: #2a2a2a; border-color: rgba(240,237,232,0.3); }
.btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--accent-dark); cursor: pointer; font-weight: 500; transition: opacity 0.12s; }
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.98); }
.auth-toggle { text-align: center; font-size: 13px; color: var(--muted); }
.auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-toggle a:hover { text-decoration: underline; }
.auth-error { font-size: 12px; color: #f09595; text-align: center; min-height: 16px; }

/* ── Topbar ── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px 80px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; -webkit-app-region: drag; }
.app-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-name span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 10px; -webkit-app-region: no-drag; }
.count-badge { font-size: 12px; color: var(--muted); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.3s; }
.sync-dot.active { opacity: 1; animation: pulse 1s ease-in-out infinite; }
.avatar-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(201,255,114,0.12); border: 0.5px solid rgba(201,255,114,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: 500; color: var(--accent); position: relative; transition: all 0.12s; -webkit-app-region: no-drag; }
.avatar-btn:hover { background: rgba(201,255,114,0.22); }
.user-menu { display: none; position: absolute; top: 36px; right: 0; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 6px; min-width: 170px; z-index: 50; }
.user-menu.open { display: block; }
.user-menu-email { font-size: 11px; color: var(--hint); padding: 6px 10px 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-menu-item { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 7px 10px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; border-radius: 6px; transition: all 0.1s; }
.user-menu-item:hover { background: var(--surface2); color: var(--text); }
.user-menu-item.danger { color: #f09595; }
.user-menu-item.danger:hover { background: rgba(226,75,74,0.1); }

/* ── Filters ── */
.filter-row { display: flex; gap: 7px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; -webkit-app-region: no-drag; }
.filter-row::-webkit-scrollbar { display: none; }
.pill { white-space: nowrap; font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
.pill.active { background: var(--accent); color: var(--accent-dark); border-color: var(--accent); font-weight: 500; }
.pill:hover:not(.active) { background: var(--surface); color: var(--text); }

/* ── Scroll area ── */
.scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 14px 14px; scrollbar-width: thin; scrollbar-color: var(--surface2) transparent; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIX 2 — GRID LAYOUT
   Problem: CSS grid with mixed wide/narrow cards
   leaves gaps when a tall card sits next to a
   short one — the row height locks to the tallest.
   Fix: use two CSS columns side by side. Narrow
   cards go into the left or right column naturally.
   Wide cards (audio/note) span both columns via JS
   by being placed outside the two-col inner grid.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Row holds either one wide card or two narrow cards side by side */
.grid-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* Wide cards (audio, note, idea) fill the full row */
.grid-row.row-wide {
  flex-direction: column;
}

/* Narrow cards (photo, idea-short) each take half */
.grid-row.row-pair > .card-wrap {
  flex: 1;
  min-width: 0;
}

/* Single narrow card with nothing beside it */
.grid-row.row-single > .card-wrap {
  flex: 1;
  min-width: 0;
}

/* ── Cards ── */
.card-wrap { position: relative; }
.card-wrap:hover .del-btn { opacity: 1; }
.card { border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; transition: border-color 0.12s, transform 0.1s; animation: fadeIn 0.22s ease; width: 100%; }
.card:hover { border-color: var(--border2); transform: scale(1.01); }
.card:active { transform: scale(0.98); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity:0.3; transform:scale(0.85); } 50% { opacity:1; transform:scale(1); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.15; } }

.card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.card-img-placeholder { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--surface2); }

.audio-preview { height: 68px; display: flex; align-items: center; gap: 12px; padding: 0 14px; background: #1e1e2e; }
.play-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(129,140,248,0.15); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.wave { display: flex; align-items: center; gap: 2px; flex: 1; height: 26px; }
.wave-bar { width: 3px; border-radius: 2px; background: var(--audio); opacity: 0.55; }
.audio-dur { font-size: 11px; color: var(--hint); flex-shrink: 0; }

.card-body { padding: 9px 11px 11px; }
.tag { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; margin-bottom: 5px; }
.tag-idea  { background: rgba(201,255,114,0.12); color: var(--idea); }
.tag-audio { background: rgba(129,140,248,0.12); color: var(--audio); }
.tag-photo { background: rgba(251,146,60,0.12);  color: var(--photo); }
.tag-note  { background: rgba(52,211,153,0.12);  color: var(--note); }
.card-title { font-size: 12px; color: rgba(240,237,232,0.82); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-time { font-size: 10px; color: var(--hint); margin-top: 4px; }

.note-body { padding: 13px; min-height: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.note-text { font-size: 13px; line-height: 1.6; color: var(--text); flex: 1; margin-bottom: 10px; }
.idea-body { padding: 13px; min-height: 80px; display: flex; flex-direction: column; justify-content: space-between; background: rgba(201,255,114,0.04); }
.idea-text { font-size: 14px; font-weight: 500; line-height: 1.5; color: var(--accent); flex: 1; margin-bottom: 10px; font-style: italic; }

.del-btn { position: absolute; top: 7px; right: 7px; width: 20px; height: 20px; border-radius: 50%; background: rgba(14,14,14,0.8); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.12s; z-index: 10; }
.empty { text-align: center; padding: 60px 20px; color: var(--hint); font-size: 14px; line-height: 1.9; }

/* ── Capture bar ── */
.capture-bar { flex-shrink: 0; padding: 12px 14px 16px; border-top: 0.5px solid var(--border); background: var(--bg); }
.rec-indicator { display: none; align-items: center; gap: 8px; background: rgba(129,140,248,0.08); border: 0.5px solid rgba(129,140,248,0.25); border-radius: 10px; padding: 9px 13px; margin-bottom: 10px; }
.rec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--audio); animation: blink 1s ease-in-out infinite; }
.rec-label { font-size: 13px; color: var(--audio); flex: 1; }
.rec-timer { font-size: 12px; color: var(--audio); font-variant-numeric: tabular-nums; }
.rec-stop { font-size: 11px; color: var(--audio); background: rgba(129,140,248,0.15); border: 0.5px solid rgba(129,140,248,0.3); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.type-toggle { display: flex; gap: 6px; margin-bottom: 9px; }
.type-btn { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 5px 4px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.12s; }
.type-btn:hover { background: var(--surface2); }
.sel-note { background: rgba(52,211,153,0.1); color: var(--note); border-color: rgba(52,211,153,0.3); }
.sel-idea { background: rgba(201,255,114,0.1); color: var(--idea); border-color: rgba(201,255,114,0.3); }
.input-row { display: flex; gap: 8px; margin-bottom: 9px; align-items: center; }
.txt-input { flex: 1; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 9px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.12s; }
.txt-input::placeholder { color: var(--hint); }
.txt-input:focus { border-color: rgba(201,255,114,0.35); }
.send-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.12s; }
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.95); }
.cap-btns { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
.cap-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.12s; font-family: 'DM Sans', sans-serif; }
.cap-btn:hover { background: var(--surface2); border-color: var(--border2); }
.cap-btn:active { transform: scale(0.97); }
.cap-btn.recording { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.35); }
.cap-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.cap-label { font-size: 11px; color: var(--muted); font-weight: 500; }
#file-input { display: none; }

/* ── Overlay ── */
.overlay { display: none; position: absolute; inset: 0; background: rgba(14,14,14,0.97); z-index: 100; flex-direction: column; overflow-y: auto; border-radius: 20px; }
.overlay.open { display: flex; }
.overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; flex-shrink: 0; }
.overlay-close { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 5px 13px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
.overlay-close:hover { background: var(--surface2); color: var(--text); }
.overlay-body { padding: 0 20px 28px; flex: 1; }
.overlay-img { width: 100%; border-radius: var(--radius); margin-bottom: 16px; display: block; }
.overlay-edit { margin-top: 12px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 10px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; resize: none; width: 100%; min-height: 80px; transition: border-color 0.12s; line-height: 1.6; }
.overlay-edit:focus { border-color: rgba(201,255,114,0.35); }
.overlay-meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
.overlay-del { margin-top: 14px; width: 100%; background: rgba(226,75,74,0.08); border: 0.5px solid rgba(226,75,74,0.25); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f09595; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
.overlay-del:hover { background: rgba(226,75,74,0.15); }

/* ── Loading ── */
.loading-screen { display: flex; align-items: center; justify-content: center; height: 100dvh; flex-direction: column; gap: 16px; }
.loading-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }

/* ── Toast ── */
.toast { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 20px; padding: 7px 16px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: opacity 0.2s; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;">brain<span style="color:var(--accent)">dump</span></div>
  <div class="loading-dot"></div>
</div>

<!-- Auth -->
<div class="auth-screen" id="auth-screen" style="display:none;">
  <div class="auth-logo">brain<span>dump</span></div>
  <div class="auth-tagline">Capture everything.<br>Forget nothing.</div>
  <div class="auth-card">
    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <span class="auth-divider-text">or</span>
      <div class="auth-divider-line"></div>
    </div>
    <input class="auth-input" id="auth-email" type="email" placeholder="Email address" />
    <input class="auth-input" id="auth-password" type="password" placeholder="Password" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" id="btn-signin">Sign in</button>
    <div class="auth-toggle" id="auth-toggle-row">No account? <a id="toggle-auth">Create one</a></div>
  </div>
</div>

<!-- Main app -->
<div class="shell" id="main-screen" style="display:none;">
  <div class="app">
    <div class="topbar">
      <div class="app-name">brain<span>dump</span></div>
      <div class="topbar-right">
        <div class="sync-dot" id="sync-dot"></div>
        <div class="count-badge" id="count-badge">0 ideas</div>
        <div class="avatar-btn" id="avatar-btn">
          <span id="avatar-initials">?</span>
          <div class="user-menu" id="user-menu">
            <div class="user-menu-email" id="user-email-display"></div>
            <button class="user-menu-item danger" id="btn-signout">Sign out</button>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="photo">Photos</button>
      <button class="pill" data-filter="audio">Audio</button>
      <button class="pill" data-filter="idea">Ideas</button>
      <button class="pill" data-filter="note">Notes</button>
    </div>

    <div class="scroll-area">
      <div class="grid" id="grid"></div>
    </div>

    <div class="capture-bar">
      <div class="rec-indicator" id="rec-indicator">
        <div class="rec-dot"></div>
        <span class="rec-label">Recording</span>
        <span class="rec-timer" id="rec-timer">0:00</span>
        <button class="rec-stop" id="rec-stop">Stop & save</button>
      </div>
      <div class="type-toggle">
        <button class="type-btn sel-note" id="btn-note">Note</button>
        <button class="type-btn" id="btn-idea">" Idea "</button>
      </div>
      <div class="input-row">
        <input class="txt-input" id="txt-input" placeholder="Dump a thought..." autocomplete="off" />
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0e0e0e" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="cap-btns">

            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="1.8"><rect x="3" y="5" width="18" height="15" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M8 5l1.5-2h5L16 5"/></svg>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIG — paste your keys here
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SUPABASE_URL  = 'https://arkwpebjvqzrljwjblba.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFya3dwZWJqdnF6cmxqd2pibGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTY3OTUsImV4cCI6MjA5MDg5Mjc5NX0.ZapKtGuumFBGq9MRtfFikJSbcnAv50DrQ3fooEizq4g'

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

/* ── local backup ── */
const LOCAL_KEY = 'braindump_ideas'
function saveLocal(ideas) {
  const toSave = ideas.map(i => ({ id: i.id, type: i.type, text: i.text, time: i.time, duration: i.duration, media_url: i.media_url }))
  localStorage.setItem(LOCAL_KEY, JSON.stringify(toSave))
}
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]') } catch { return [] }
}

/* ── state ── */
let ideas = []
let currentUser = null
let activeFilter = 'all'
let inputType = 'note'
let mediaRecorder = null
let audioChunks = []
let recStart = 0
let recTimerInterval = null
let objectURLs = {}
let isSignUp = false

/* ── screens ── */
function showScreen(name) {
  document.getElementById('loading-screen').style.display = 'none'
  document.getElementById('auth-screen').style.display   = name === 'auth' ? 'flex' : 'none'
  document.getElementById('main-screen').style.display   = name === 'main' ? 'flex' : 'none'
}

/* ── auth ── */
document.getElementById('toggle-auth').addEventListener('click', () => {
  isSignUp = !isSignUp
  document.getElementById('btn-signin').textContent = isSignUp ? 'Create account' : 'Sign in'
  document.getElementById('toggle-auth').textContent = isSignUp ? 'Sign in instead' : 'Create one'
  document.querySelector('#auth-toggle-row').childNodes[0].textContent = isSignUp ? 'Have an account? ' : 'No account? '
  setAuthError('')
})

document.getElementById('btn-google').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } })
  if (error) setAuthError(error.message)
})

document.getElementById('btn-signin').addEventListener('click', async () => {
  const email    = document.getElementById('auth-email').value.trim()
  const password = document.getElementById('auth-password').value
  if (!email || !password) return setAuthError('Enter your email and password')
  document.getElementById('btn-signin').textContent = '...'
  const { error } = await sb.auth[isSignUp ? 'signUp' : 'signInWithPassword']({ email, password })
  document.getElementById('btn-signin').textContent = isSignUp ? 'Create account' : 'Sign in'
  if (error) return setAuthError(error.message)
  if (isSignUp) setAuthError('Check your email to confirm your account!')
})

document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('auth-password').focus() })
document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-signin').click() })
function setAuthError(msg) { document.getElementById('auth-error').textContent = msg }

document.getElementById('btn-signout').addEventListener('click', async () => {
  await sb.auth.signOut()
  ideas = []; currentUser = null
  localStorage.removeItem(LOCAL_KEY)
  toggleMenu(false); showScreen('auth')
})

/* ── user menu ── */
document.getElementById('avatar-btn').addEventListener('click', e => { e.stopPropagation(); toggleMenu() })
document.addEventListener('click', () => toggleMenu(false))
function toggleMenu(force) {
  const m = document.getElementById('user-menu')
  m.classList.toggle('open', force !== undefined ? force : !m.classList.contains('open'))
}
function setUserUI(user) {
  const email = user.email || user.user_metadata?.email || ''
  document.getElementById('avatar-initials').textContent = email ? email[0].toUpperCase() : '?'
  document.getElementById('user-email-display').textContent = email
}

/* ── db ── */
function setSyncing(on) { document.getElementById('sync-dot').classList.toggle('active', on) }

async function loadIdeas() {
  const local = loadLocal()
  if (local.length > 0) { ideas = local; renderGrid() }
  setSyncing(true)
  const { data, error } = await sb.from('ideas').select('*')
    .eq('user_id', currentUser.id).order('created_at', { ascending: false })
  setSyncing(false)
  if (error) { toast('Offline — showing local data'); return }
  ideas = data.map(r => ({ id: r.id, type: r.type, text: r.text, time: r.time, duration: r.duration, media_url: r.media_url }))
  saveLocal(ideas); renderGrid()
}

async function saveIdeaToDB(idea) {
  saveLocal(ideas)
  setSyncing(true)
  const { error } = await sb.from('ideas').upsert({
    id: idea.id, user_id: currentUser.id,
    type: idea.type, text: idea.text, time: idea.time,
    duration: idea.duration || null, media_url: idea.media_url || null,
    created_at: new Date(idea.id).toISOString(),
  })
  setSyncing(false)
  if (error) toast('Cloud save failed — saved locally')
}

async function deleteIdeaFromDB(id) {
  saveLocal(ideas)
  setSyncing(true)
  await sb.from('ideas').delete().eq('id', id).eq('user_id', currentUser.id)
  setSyncing(false)
}

async function uploadMedia(file) {
  const ext  = (file.name || 'file').split('.').pop()
  const filePath = `${currentUser.id}/${Date.now()}.${ext}`
  const { error } = await sb.storage.from('braindump-media').upload(filePath, file)
  if (error) { toast('Upload failed'); return null }
  return sb.storage.from('braindump-media').getPublicUrl(filePath).data.publicUrl
}

/* ── helpers ── */
function ts() {
  const d = new Date(), days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
  return `${days[d.getDay()]}, ${d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`
}
function fmtDur(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0') }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function waveHtml() { return [10,22,16,28,12,20,8,18,14,24].map(h=>`<div class="wave-bar" style="height:${h}px"></div>`).join('') }
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2200)
}

/* ── input type ── */
function setInputType(t) {
  inputType = t
  document.getElementById('btn-note').className = 'type-btn' + (t==='note' ? ' sel-note' : '')
  document.getElementById('btn-idea').className = 'type-btn' + (t==='idea' ? ' sel-idea' : '')
  document.getElementById('txt-input').placeholder = t==='idea' ? 'Type your idea...' : 'Dump a thought...'
  document.getElementById('txt-input').focus()
}
document.getElementById('btn-note').addEventListener('click', () => setInputType('note'))
document.getElementById('btn-idea').addEventListener('click', () => setInputType('idea'))

/* ── add text ── */
async function addText() {
  const txt = document.getElementById('txt-input').value.trim()
  if (!txt) return
  const idea = { id: Date.now(), type: inputType, text: txt, time: ts() }
  ideas.unshift(idea); document.getElementById('txt-input').value = ''
  renderGrid(); await saveIdeaToDB(idea); toast('Saved!')
}
document.getElementById('send-btn').addEventListener('click', addText)
document.getElementById('txt-input').addEventListener('keydown', e => { if (e.key==='Enter') addText() })

/* ── add photo ── */
document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return
  const id = Date.now()
  const tempUrl = URL.createObjectURL(file); objectURLs[id] = tempUrl
  const idea = { id, type: 'photo', text: file.name.replace(/\.[^.]+$/,'') || 'Photo', time: ts(), media_url: tempUrl }
  ideas.unshift(idea); renderGrid(); e.target.value = ''
  const publicUrl = await uploadMedia(file)
  if (publicUrl) { idea.media_url = publicUrl; URL.revokeObjectURL(tempUrl); delete objectURLs[id]; renderGrid() }
  await saveIdeaToDB(idea); toast('Photo saved!')
})
document.getElementById('btn-photo').addEventListener('click', () => document.getElementById('file-input').click())

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIX 1 — AUDIO
   Root causes:
   1. CSP was blocking blob: URLs for media playback
   2. Electron needs MediaStream feature flag (set in main.js)
   3. Added explicit error logging so failures are visible
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function startAudio() {
  // Check if mediaDevices is available at all
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast('Microphone not available in this environment')
    return
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    audioChunks = []

    // Pick best supported format
    const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg']
      .find(t => MediaRecorder.isTypeSupported(t)) || ''

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {})
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data) }

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop())
      clearInterval(recTimerInterval)

      if (audioChunks.length === 0) { toast('No audio captured'); return }

      const dur      = Math.round((Date.now() - recStart) / 1000)
      const blobType = audioChunks[0].type || mimeType || 'audio/webm'
      const blob     = new Blob(audioChunks, { type: blobType })
      const id       = Date.now()

      // Create object URL for immediate local playback
      const tempUrl = URL.createObjectURL(blob)
      objectURLs[id] = tempUrl

      const idea = { id, type: 'audio', duration: dur, text: 'Voice memo', time: ts(), media_url: tempUrl }
      ideas.unshift(idea); renderGrid()

      document.getElementById('rec-indicator').style.display = 'none'
      document.getElementById('btn-audio').classList.remove('recording')
      document.getElementById('audio-btn-label').textContent = 'Record Audio'

      // Upload to Supabase in background
      const ext       = blobType.includes('ogg') ? 'ogg' : 'webm'
      const audioFile = new File([blob], `audio_${id}.${ext}`, { type: blobType })
      const publicUrl = await uploadMedia(audioFile)
      if (publicUrl) {
        idea.media_url = publicUrl
        URL.revokeObjectURL(tempUrl)
        delete objectURLs[id]
      }
      await saveIdeaToDB(idea)
      toast('Audio saved!')
    }

    recStart = Date.now()
    mediaRecorder.start(200)
    document.getElementById('rec-indicator').style.display = 'flex'
    document.getElementById('btn-audio').classList.add('recording')
    document.getElementById('audio-btn-label').textContent = 'Stop Recording'
    recTimerInterval = setInterval(() => {
      document.getElementById('rec-timer').textContent = fmtDur((Date.now()-recStart)/1000)
    }, 500)

  } catch (err) {
    console.error('Audio error:', err)
    if (err.name === 'NotAllowedError') {
      toast('Mic access denied — allow in System Settings > Privacy > Microphone')
    } else if (err.name === 'NotFoundError') {
      toast('No microphone found')
    } else {
      toast('Audio error: ' + err.message)
    }
  }
}

function stopAudio() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop()
}

document.getElementById('btn-audio').addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopAudio()
  else startAudio()
})
document.getElementById('rec-stop').addEventListener('click', stopAudio)

/* ── delete ── */
function deleteIdea(id) {
  ideas = ideas.filter(i => i.id !== id)
  if (objectURLs[id]) { URL.revokeObjectURL(objectURLs[id]); delete objectURLs[id] }
  document.getElementById('overlay').classList.remove('open')
  renderGrid(); deleteIdeaFromDB(id); toast('Deleted')
}

/* ── detail ── */
async function openDetail(id) {
  const idea = ideas.find(i => i.id === id); if (!idea) return
  let html = ''
  if (idea.type==='photo' && idea.media_url) html += `<img class="overlay-img" src="${idea.media_url}" />`
  if (idea.type==='audio' && idea.media_url) {
    html += `<div style="background:#1e1e2e;border-radius:12px;padding:14px;margin-bottom:14px;">
      <audio controls style="width:100%;accent-color:#818cf8;" src="${idea.media_url}"></audio>
      <div style="font-size:12px;color:var(--hint);margin-top:8px;">Duration: ${fmtDur(idea.duration||0)}</div></div>`
  }
  html += `<span class="tag tag-${idea.type}">${idea.type}</span>`
  html += `<textarea class="overlay-edit" id="overlay-edit" rows="4">${escHtml(idea.text)}</textarea>`
  html += `<div class="overlay-meta">${idea.time}</div>`
  html += `<button class="overlay-del" onclick="deleteIdea(${id})">Delete this idea</button>`
  document.getElementById('overlay-body').innerHTML = html
  document.getElementById('overlay').classList.add('open')
  document.getElementById('overlay-edit')?.addEventListener('input', async e => {
    const i = ideas.find(x => x.id===id)
    if (i) { i.text = e.target.value; await saveIdeaToDB(i); renderGrid() }
  })
}
document.getElementById('overlay-close').addEventListener('click', () => document.getElementById('overlay').classList.remove('open'))

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIX 2 — RENDER GRID
   Instead of CSS grid (which leaves gaps between
   mixed-height cards), we build rows manually in JS:
   - Wide cards (audio, note, idea) get their own full row
   - Narrow cards (photo) are paired into rows of 2
   - A lone narrow card at the end gets its own row
   This way there are never any empty grid cells.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function isWide(type) {
  return type === 'audio' || type === 'note' || type === 'idea'
}

function makeCardEl(idea) {
  const wrap = document.createElement('div'); wrap.className = 'card-wrap'
  const card = document.createElement('div'); card.className = 'card'

  if (idea.type === 'photo') {
    const img = idea.media_url
      ? `<img class="card-img" src="${idea.media_url}" loading="lazy" />`
      : `<div class="card-img-placeholder"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`
    card.innerHTML = img + `<div class="card-body"><span class="tag tag-photo">Photo</span><div class="card-title">${escHtml(idea.text)}</div><div class="card-time">${idea.time}</div></div>`
  } else if (idea.type === 'audio') {
    card.innerHTML = `<div class="audio-preview"><button class="play-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="#818cf8"><path d="M8 5v14l11-7z"/></svg></button><div class="wave">${waveHtml()}</div><span class="audio-dur">${fmtDur(idea.duration||0)}</span></div><div class="card-body"><span class="tag tag-audio">Audio</span><div class="card-title">${escHtml(idea.text)}</div><div class="card-time">${idea.time}</div></div>`
  } else if (idea.type === 'idea') {
    card.innerHTML = `<div class="idea-body"><div class="idea-text">"${escHtml(idea.text)}"</div><div><span class="tag tag-idea">Idea</span><div class="card-time">${idea.time}</div></div></div>`
  } else {
    card.innerHTML = `<div class="note-body"><div class="note-text">${escHtml(idea.text)}</div><div><span class="tag tag-note">Note</span><div class="card-time">${idea.time}</div></div></div>`
  }

  card.addEventListener('click', () => openDetail(idea.id))

  const del = document.createElement('button'); del.className = 'del-btn'
  del.innerHTML = `<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="rgba(240,237,232,0.7)" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>`
  del.addEventListener('click', e => { e.stopPropagation(); deleteIdea(idea.id) })

  wrap.appendChild(card); wrap.appendChild(del)
  return wrap
}

function renderGrid() {
  const filtered = activeFilter === 'all' ? ideas : ideas.filter(i => i.type === activeFilter)
  const grid = document.getElementById('grid')
  document.getElementById('count-badge').textContent = ideas.length + ' idea' + (ideas.length !== 1 ? 's' : '')

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">Nothing here yet.<br>Start dumping your thoughts below.</div>`
    return
  }

  grid.innerHTML = ''

  // Build rows: wide cards get their own row, narrow cards are paired
  let i = 0
  while (i < filtered.length) {
    const idea = filtered[i]
    const row  = document.createElement('div')
    row.className = 'grid-row'

    if (isWide(idea.type)) {
      // Wide card — full row on its own
      row.classList.add('row-wide')
      row.appendChild(makeCardEl(idea))
      i++
    } else {
      // Narrow card — try to pair with the next narrow card
      const next = filtered[i + 1]
      if (next && !isWide(next.type)) {
        row.classList.add('row-pair')
        row.appendChild(makeCardEl(idea))
        row.appendChild(makeCardEl(next))
        i += 2
      } else {
        // Lone narrow card at end
        row.classList.add('row-single')
        row.appendChild(makeCardEl(idea))
        i++
      }
    }

    grid.appendChild(row)
  }
}

/* ── filters ── */
document.getElementById('filter-row').addEventListener('click', e => {
  const pill = e.target.closest('.pill'); if (!pill) return
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'))
  pill.classList.add('active'); activeFilter = pill.dataset.filter; renderGrid()
})

/* ── boot ── */
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user; setUserUI(currentUser)
    showScreen('main'); await loadIdeas()
  } else { showScreen('auth') }
})
;(async () => { const { data: { session } } = await sb.auth.getSession(); if (!session) showScreen('auth') })()
</script>
